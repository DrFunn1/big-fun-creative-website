<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Tunnel Corridor Simulation</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; }
    #simCanvas { background: #111; }
    .dg { z-index: 10; }
  </style>
  <!-- dat.GUI CDN -->
  <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
</head>
<body>
  <canvas id="simCanvas"></canvas>
  <script>
    // ---- Ensure script runs after DOM loads ----
    document.addEventListener('DOMContentLoaded', () => {
      // Corridor dims
      const L = 12, W = 3.3, D = 0.3, dt = 0.016;
      const params = {
        scenario: 'Medium',
        densities: { Low: 8, Medium: 16, High: 24, Extreme: 32 },
        greetProb: 0.1,
        slipProb: 0.9,
        start: startSim,
        reset: initSim
      };
      let agents = [], running = false;

      // Canvas setup with fixed aspect ratio
      const canvas = document.getElementById('simCanvas');
      const ctx = canvas.getContext('2d');
      function resizeCanvas() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const aspect = W / L;
        if (vh / vw < aspect) {
          canvas.height = vh;
          canvas.width = vh / aspect;
        } else {
          canvas.width = vw;
          canvas.height = vw * aspect;
        }
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // UI controls
      const gui = new dat.GUI();
      gui.add(params, 'scenario', Object.keys(params.densities)).name('Density');
      gui.add(params, 'greetProb', 0, 1, 0.01).name('Greet %');
      gui.add(params, 'slipProb', 0, 1, 0.01).name('Slip %');
      gui.add(params, 'start').name('Start');
      gui.add(params, 'reset').name('Reset');

      // Spawn: simple 2D rejection sampling
      function generateAgents(N) {
        const list = [];
        for (let i = 0; i < N; i++) {
          let tries = 0;
          while (tries++ < 1000) {
            const x = Math.random() * L;
            const y = D / 2 + Math.random() * (W - D);
            if (list.every(a => Math.hypot(a.x - x, a.y - y) >= D)) {
              const dir = i < N / 2 ? 1 : -1;
              list.push({ x, y, dir, state: 'walk', timer: 0 });
              break;
            }
          }
        }
        return list;
      }

      // Simulation step with early slip and hard separation
      function stepSim() {
        for (const a of agents) {
          if (a.state === 'greet') {
            a.timer -= dt;
            if (a.timer <= 0) a.state = 'walk';
            continue;
          }
          let vx = a.dir * 1.2, vy = 0;
          for (const b of agents) {
            if (b === a) continue;
            const pax = a.x + vx * dt, pay = a.y;
            const pbx = b.x + b.dir * 1.2 * dt, pby = b.y;
            const dx = pax - pbx, dy = pay - pby;
            const dist = Math.hypot(dx, dy);
            // Early slip at 4*D
            if (dist < 4 * D && Math.random() < params.slipProb) {
              vy += a.dir * 0.3 * ((4 * D - dist) / (4 * D));
            }
            // Hard separation
            if (dist < D) {
              const overlap = D - dist;
              const nx = dx / dist, ny = dy / dist;
              vx += nx * (overlap / dt);
              vy += ny * (overlap / dt);
            }
            // Greeting
            if (dist < 1.1 * D && Math.random() < params.greetProb * dt) {
              a.state = b.state = 'greet';
              a.timer = b.timer = 1;
            }
          }
          // Wall clamp
          const nextY = a.y + vy * dt;
          if (nextY < D / 2) vy += (D / 2 - nextY) / dt;
          if (nextY > W - D / 2) vy += ((W - D / 2) - nextY) / dt;
          // Update position
          a.x += vx * dt;
          a.y += vy * dt;
          // Wrap X
          if (a.x < 0) a.x += L;
          if (a.x > L) a.x -= L;
        }
      }

      // Draw agents
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const a of agents) {
          const px = (a.x / L) * canvas.width;
          const py = (a.y / W) * canvas.height;
          const pr = (D / 2 / L) * canvas.width;
          ctx.beginPath();
          ctx.arc(px, py, pr, 0, 2 * Math.PI);
          ctx.fillStyle = a.state === 'greet' ? '#f00' : '#0f0';
          ctx.fill();
        }
      }

      // Control functions
      function initSim() {
        agents = generateAgents(params.densities[params.scenario]);
        running = false;
        draw();
      }
      function startSim() {
        if (!running) { running = true; tick(); }
      }
      function tick() {
        if (!running) return;
        stepSim();
        draw();
        requestAnimationFrame(tick);
      }

      // Start initial state
      initSim();
    });
  </script>
</body>
</html>
