<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Tunnel Corridor Simulation</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #simCanvas { display: block; background: #111; }
  </style>
  <!-- dat.GUI CDN -->
  <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
</head>
<body>
  <canvas id="simCanvas"></canvas>
  <script type="module">
    // ----- Parameters and Setup -----
    const L = 12, W = 3.3, D = 0.3;
    const params = {
      scenario: 'Medium',
      densityOptions: { 'Low': 8, 'Medium': 16, 'High': 24, 'Extreme': 32 },
      greetProb: 0.1,
      slipProb: 0.9,
      start: () => startSim(),
      reset: () => initSim()
    };

    // Canvas sizing
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ----- dat.GUI Controls -----
    const gui = new dat.GUI();
    gui.add(params, 'scenario', Object.keys(params.densityOptions)).name('Density');
    gui.add(params, 'greetProb', 0, 1, 0.01).name('Greet Prob');
    gui.add(params, 'slipProb', 0, 1, 0.01).name('Slip Prob');
    gui.add(params, 'start').name('Start');
    gui.add(params, 'reset').name('Reset');

    // ----- Simulation State -----
    let agents = [];
    let running = false;
    const dt = 0.016;

    // Dummy implementation placeholders:
    import { generateAgents, stepSimulation } from './simulation.js';
    function drawAgents() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      agents.forEach(a => {
        const x = (a.x / L) * canvas.width;
        const y = (a.y / W) * canvas.height;
        ctx.beginPath();
        ctx.arc(x, y, (D/2 / L) * canvas.width, 0, Math.PI*2);
        ctx.fillStyle = '#0f0';
        ctx.fill();
      });
    }

    function initSim() {
      const N = params.densityOptions[params.scenario];
      agents = generateAgents({ N, L, W, D, pGreet: params.greetProb, slipProb: params.slipProb });
      running = false;
      drawAgents();
    }

    function startSim() {
      if (!running) {
        running = true;
        requestAnimationFrame(loop);
      }
    }

    function loop() {
      if (!running) return;
      // update parameter changes
      agents.forEach(a => { a.pGreet = params.greetProb; a.slipProb = params.slipProb; });
      stepSimulation(agents, { dt, L, W, D });
      drawAgents();
      requestAnimationFrame(loop);
    }

    // Initialize on load
    initSim();
  </script>
</body>
</html>
