<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Tunnel Corridor Simulation</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; }
    #simCanvas { background: #111; }
    .dg { z-index: 10; }
  </style>
  <!-- dat.GUI CDN -->
  <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js" defer></script>
</head>
<body>
  <canvas id="simCanvas"></canvas>
  <script defer>
    // Debug error handler
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error("Error: " + msg + " at " + lineNo + ":" + columnNo);
    };
    window.onload = function() {
      console.log("Simulation script loaded");
      // Corridor dims
      const L=12, W=3.3, D=0.3, dt=0.016;
      const params = {
        scenario:'Medium', densities:{Low:8,Medium:16,High:24,Extreme:32},
        greetProb:0.1, slipProb:0.9,
        start:startSim, reset:initSim
      };
      let agents=[], running=false;
      const c=document.getElementById('simCanvas');
      const ctx=c.getContext('2d');
      // Resize
      function resizeCanvas(){
        const vw=window.innerWidth, vh=window.innerHeight;
        const aspect=W/L;
        if(vh/vw<aspect){c.height=vh; c.width=vh/aspect;} else {c.width=vw; c.height=vw*aspect;}
        console.log(`Canvas ${c.width}x${c.height}`);
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      // GUI
      const gui=new dat.GUI();
      gui.add(params,'scenario',Object.keys(params.densities)).name('Density');
      gui.add(params,'greetProb',0,1,0.01).name('Greet %');
      gui.add(params,'slipProb',0,1,0.01).name('Slip %');
      gui.add(params,'start').name('Start');
      gui.add(params,'reset').name('Reset');
      // Spawn
      function generateAgents(N){
        const list=[];
        for(let i=0;i<N;i++){
          let tries=0;
          while(tries++<1000){
            const x=Math.random()*L;
            const y=D/2+Math.random()*(W-D);
            if(list.every(a=>Math.hypot(a.x-x,a.y-y)>=D)){
              list.push({x,y,dir:i<N/2?1:-1,state:'walk',timer:0});
              break;
            }
          }
        }
        return list;
      }
      // Step
      function stepSim(){
        agents.forEach(a=>{
          if(a.state==='greet'){a.timer-=dt; if(a.timer<=0)a.state='walk';return;}
          let vx=a.dir*1.2, vy=0;
          agents.forEach(b=>{
            if(b===a)return;
            const pax=a.x+vx*dt, pay=a.y;
            const pbx=b.x+b.dir*1.2*dt, pby=b.y;
            const dx=pax-pbx, dy=pay-pby;
            const dist=Math.hypot(dx,dy);
            if(dist<4*D&&Math.random()<params.slipProb) vy+=a.dir*0.3*((4*D-dist)/(4*D));
            if(dist<D){const overlap=D-dist, nx=dx/dist, ny=dy/dist; vx+=nx*(overlap/dt); vy+=ny*(overlap/dt);}            
            if(dist<1.1*D&&Math.random()<params.greetProb*dt){a.state=b.state='greet';a.timer=b.timer=1;}
          });
          const nextY=a.y+vy*dt;
          if(nextY<D/2) vy+=(D/2-nextY)/dt;
          if(nextY>W-D/2) vy+=((W-D/2)-nextY)/dt;
          a.x+=vx*dt; a.y+=vy*dt;
          if(a.x<0) a.x+=L; if(a.x>L) a.x-=L;
        });
      }
      // Draw
      function draw(){
        ctx.clearRect(0,0,c.width,c.height);
        agents.forEach(a=>{
          const px=(a.x/L)*c.width, py=(a.y/W)*c.height, pr=(D/2/L)*c.width;
          ctx.beginPath(); ctx.arc(px,py,pr,0,2*Math.PI);
          ctx.fillStyle=a.state==='greet'?'#f00':'#0f0'; ctx.fill();
        });
      }
      // Control
      function initSim(){agents=generateAgents(params.densities[params.scenario]);running=false;draw();}
      function startSim(){if(!running){running=true;tick();}}
      function tick(){if(!running)return;stepSim();draw();requestAnimationFrame(tick);}
      initSim();
    };
  </script>
</body>
</html>
